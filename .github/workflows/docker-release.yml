name: Docker Image Tagged CI

on: 
  release:
    types:
      - published
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Docker Hub login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ryanwhowe/debian-dev
        tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=schedule,enable=false # Disable schedule tagging
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,priority=100

    - name: Build and push Docker Image
      uses: docker/build-push-action@v5
      with:
        platforms: linux/amd64,linux/amd64/v2,linux/amd64/v3,linux/arm64,linux/riscv64,linux/ppc64le,linux/s390x,linux/arm/v7,linux/arm/v6
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=ryanwhowe/debian-dev:buildcache
        cache-to: type=registry,ref=ryanwhowe/debian-dev:buildcache,mode=max
